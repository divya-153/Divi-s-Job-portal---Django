{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>walkinhub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  
.topheader {
  position: sticky;
  top: 0;
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  background: var(--card);
  padding: 16px 24px;
  margin-bottom: 24px;
  border-radius: 14px;
  box-shadow: 0 6px 14px  rgba(44, 70, 183, 0.434);
}
.topheader p{
   font-size: 20px;
   font-weight: 600;
   color: var(--blue);
}
.topheader img{
    width: 45px;
}
</style>
</head>

<body>

<header>
  <div class="topheader">
    <img id="backward" src="{% static "images/backward.png" %}">
    <p> Interview Details </p>
    <img src="{% static "images/acc1.png" %}">
  </div>
</header>
<!-- PAGE CONTENT WILL COME HERE -->
<main>
    {% if messages %}
    {% for message in messages %}
        <div  style="color:green; text-align:center" class="alert {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    {% block content %}
    {% endblock %}
</main>


</body>
</html>
